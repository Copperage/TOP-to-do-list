<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<script src="./main.js" defer></script>
	</head>
	<body>
		<div class="content">
			<header><h1>To-do List</h1></header>
			<div class="content-box">
				<div class="left">
					<ul class="inbox">
						<h2>Home</h2>
						<li class="today">Today</li>
						<li class="this week">This week</li>
						<li class="important">
							<svg
								xmlns="http://www.w3.org/2000/svg"
								viewBox="-2 -2 24 24"
								width="28"
								fill="#ffd000"
							>
								<path
									d="M10 16.379l-6.173 3.245 1.179-6.874L.01 7.882l6.902-1.003L10 .624l3.087 6.255 6.902 1.003-4.995 4.868 1.18 6.874z"
								></path>
							</svg>
							Important!
						</li>
					</ul>
					<div class="seperator"></div>
					<ul class="projects">
						<h2>Projects</h2>
						<li class="add-project">
							<svg
								xmlns="http://www.w3.org/2000/svg"
								viewBox="-4.5 -4.5 24 24"
								width="28"
								fill="currentColor"
							>
								<path
									d="M8.9 6.9v-5a1 1 0 1 0-2 0v5h-5a1 1 0 1 0 0 2h5v5a1 1 0 1 0 2 0v-5h5a1 1 0 1 0 0-2h-5z"
								></path>
							</svg>
							Add projects
						</li>
					</ul>
					<footer>
						<a href="https://github.com/Copperage/TOP-to-do-list">Github</a> | ©
						2023 Copperage
					</footer>
				</div>
				<div class="right"></div>
			</div>
		</div>
	</body>
</html>
